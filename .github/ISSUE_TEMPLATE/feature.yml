name: Feature request
description: Propose a scoped product or engineering change
title: "[Feature]: "
labels: []
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the user or operator problem, not only a preferred implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Security, tenancy, database, API, and compatibility impact
    validations:
      required: true
  - type: input
    id: requirements
    attributes:
      label: Related PRD requirements or issues
